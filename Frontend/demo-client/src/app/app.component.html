<div class="container">
  <div class="row">
    <div class="col-md-12">

      <div class="card bg-dark my-5">
        <div class="card-body">
          <a routerLink="/" class="card-title text-center text-white py-3 not-decorated"><h2>{{ title }}</h2></a>
          <!-- AUTH BAR -->
          <div class="text-end mb-3">
            <button *ngIf="isLoggedIn()" class="btn btn-danger" (click)="logout()">
              Logout
            </button>

            <a *ngIf="!isLoggedIn()" routerLink="/login" class="btn btn-success me-2">
              Login
            </a>

            <a *ngIf="!isLoggedIn()" routerLink="/register" class="btn btn-primary">
              Register
            </a>
          </div>

          <!-- APP NAVIGATION -->
          <ul class="text-center list-inline py-3" *ngIf="isLoggedIn()">
            <li class="list-inline-item">
              <a routerLink="/todos" class="btn btn-info">List Todos</a>
            </li>
            <li class="list-inline-item">
              <a routerLink="/savetodo" class="btn btn-info">Add Todo</a>
            </li>
          </ul>

        </div>
      </div>

      <router-outlet></router-outlet>

    </div>
  </div>
</div>
